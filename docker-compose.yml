services:
  postgres:
    image: postgres:16-alpine
    container_name: lumpa-postgres
    environment:
      POSTGRES_DB: lumpacrypto
      POSTGRES_USER: lumpa
      POSTGRES_PASSWORD: lumpa_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumpa-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: